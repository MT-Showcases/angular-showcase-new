<!-- GoF Pattern: Observer — render global toast observer bound to notification stream. -->
<div appLinkInterceptor>
  <app-navbar></app-navbar>

  <main class="main" [@routeAnimations]="getRouteAnimationState(outlet)">
    <router-outlet #outlet="outlet"></router-outlet>
  </main>

  <!-- Bouncing logos component -->
  <app-bouncing-logo></app-bouncing-logo>
</div>

<!-- Modal for external/internal links -->
<app-link-modal></app-link-modal>

<!-- GoF Pattern: Observer — toast component subscribes to notification stream -->
<app-notification-toast></app-notification-toast>
