<!-- GoF Pattern: Factory Method — instantiate selected lab dynamically through a centralized creator. -->
<section class="pattern-playground" aria-label="Interactive pattern labs">
  <div class="pattern-playground__lab-panel" role="tabpanel">
    <ng-container *ngComponentOutlet="activeLabComponent()"></ng-container>
  </div>

  <div class="pattern-playground__lab-tabs" role="tablist" aria-label="Pattern lab selector">
    @for (lab of labTabs; track lab.id) {
    <button
      type="button"
      role="tab"
      class="pattern-playground__lab-tab"
      [attr.aria-selected]="activeLabId() === lab.id"
      [class.pattern-playground__lab-tab--active]="activeLabId() === lab.id"
      (click)="selectLab(lab.id)"
    >
      <span class="pattern-playground__lab-tab-title">{{ lab.label }}</span>
      <span class="pattern-playground__lab-tab-summary">{{ lab.summary }}</span>
    </button>
    }
  </div>
</section>
